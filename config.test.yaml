# Test configuration for MCP Server

server:
  port: 3001

sources:
  - type: github
    owner: microsoft
    repo: vscode
    branch: main
    token: ${GITHUB_TOKEN_TEST}
    
  - type: github
    owner: facebook
    repo: react
    branch: main
    
  - type: local
    path: /tmp/test-project

files:
  patterns:
    - CLAUDE.md
    - README.md
    - docs/**/*.md
  max_size: 10240  # 10KB for tests

github:
  token: ${GITHUB_TOKEN_TEST}
  webhook_secret: ${GITHUB_WEBHOOK_SECRET_TEST}

fetch:
  timeout: 5000
  retries: 2
  retry_delay: 500
  max_depth: 1

cache:
  ttl: 60  # 1 minute for tests