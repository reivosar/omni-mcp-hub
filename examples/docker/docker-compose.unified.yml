version: '3.8'

services:
  # Traditional SSE mode (backwards compatible)
  omni-mcp-hub-sse:
    container_name: omni-mcp-hub-sse-${SOURCE_TYPE:-default}
    image: docker-config-omni-mcp-hub:latest
    ports:
      - "3000:3000"
    volumes:
      - ./dist/current-config.yaml:/app/mcp-sources.yaml:ro
      - ${HOME}/projects:/projects:ro
      - ${HOME}/documents:/documents:ro
    environment:
      - PORT=3000
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - NODE_ENV=production
      - MCP_MODE=sse
    restart: unless-stopped

  # New stdio mode (Claude Code compatible)
  omni-mcp-hub-stdio:
    container_name: omni-mcp-hub-stdio-${SOURCE_TYPE:-default}
    image: docker-config-omni-mcp-hub:latest
    volumes:
      - ./dist/current-config.yaml:/app/mcp-sources.yaml:ro
      - ${HOME}/projects:/projects:ro
      - ${HOME}/documents:/documents:ro
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - NODE_ENV=production
      - MCP_MODE=stdio
    restart: unless-stopped
    # stdio mode doesn't need exposed ports - it uses stdin/stdout

  # Unified mode (both SSE and stdio)
  omni-mcp-hub-unified:
    container_name: omni-mcp-hub-unified-${SOURCE_TYPE:-default}
    image: docker-config-omni-mcp-hub:latest
    ports:
      - "3000:3000"
    volumes:
      - ./dist/current-config.yaml:/app/mcp-sources.yaml:ro
      - ${HOME}/projects:/projects:ro
      - ${HOME}/documents:/documents:ro
    environment:
      - PORT=3000
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - NODE_ENV=production
      - MCP_MODE=unified
    restart: unless-stopped