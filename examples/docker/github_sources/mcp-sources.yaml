server:
  port: ${PORT:-3000}

# GitHub repository documentation sources
github_sources:
  # Claude Code Engineering Guide
  - url: github:reivosar/claude-code-engineering-guide
    branch: main

# File processing configuration
files:
  patterns:
    - "dsl/*.dsl"
    - "dsl/**/*.dsl"
    - "dsl/CLAUDE.md"
  max_size: 2097152  # 2MB

# Network settings
fetch:
  timeout: 60000  # 1 minute
  retries: 3
  retry_delay: 1000
  max_depth: 3

# Security configuration
security:
  content_validation:
    enabled: true
    max_file_size: 5242880  # 5MB