# MCP Server Configuration

server:
  port: 3000
  
sources:
  # GitHub リポジトリ（自動判別対応）
  - url: https://github.com/microsoft/vscode
    token: ${GITHUB_TOKEN_PUBLIC}  # パブリック用トークン
    
  - url: github:facebook/react@main
    # token未設定 = デフォルトトークン使用
    
  - url: your-private-org/private-repo@main
    token: ${GITHUB_TOKEN_PRIVATE}  # プライベート用トークン
    
  - url: company-org/enterprise-repo@develop
    token: ${GITHUB_TOKEN_ENTERPRISE}  # 企業用トークン
    
  - url: personal-account/personal-project
    token: ${GITHUB_TOKEN_PERSONAL}  # 個人用トークン
    
  # ローカルディレクトリ（自動判別対応）
  - url: /Users/mac/my-project
    
  - url: ./Documents/another-project
  
  - url: file:///absolute/path/to/project
    
  # 従来形式（互換性維持）
  - type: github
    owner: legacy-org
    repo: legacy-repo
    branch: main
    token: ${GITHUB_TOKEN_LEGACY}
    
  - type: local
    path: /Users/mac/legacy-project

files:
  patterns:
    - CLAUDE.md
    - README.md
    - docs/**/*.md
  max_size: 102400  # 100KB

fetch:
  timeout: 10000      # 10秒
  retries: 3
  retry_delay: 1000   # 1秒
  max_depth: 2

cache:
  ttl: 300  # 5分（キャッシュ有効期限）