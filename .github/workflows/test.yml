name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Setup test environment
      run: |
        cp tests/config.test.yaml config.yaml
        echo "GITHUB_TOKEN_TEST=test-token" >> $GITHUB_ENV
        echo "GITHUB_WEBHOOK_SECRET_TEST=test-secret" >> $GITHUB_ENV

    - name: Run unit tests
      run: npm run test:unit

    - name: Run integration tests
      run: npm run test:integration

    - name: Run end-to-end tests
      run: npm run test:e2e

    - name: Generate coverage report
      run: npm run test:coverage

  performance:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Setup test environment
      run: |
        cp tests/config.test.yaml config.yaml
        echo "GITHUB_TOKEN_TEST=test-token" >> $GITHUB_ENV
        echo "GITHUB_WEBHOOK_SECRET_TEST=test-secret" >> $GITHUB_ENV

    - name: Run performance tests
      run: npm test -- --testPathPattern=performance --verbose

    - name: Performance report
      run: |
        echo "Performance test completed"
        echo "Check test output for performance metrics"