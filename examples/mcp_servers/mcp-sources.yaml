server:
  port: ${PORT:-3000}

# MCP server aggregation - no documentation sources needed
# This example focuses purely on MCP server aggregation

# MCP server aggregation
mcp_servers:
  # Research and academic papers
  - name: arxiv
    install_command: pip install arxiv-mcp-server
    command: python
    args: ["-m", "arxiv_mcp"]
    enabled: true
    env:
      ARXIV_API_KEY: ${ARXIV_API_KEY}

  # File system operations
  - name: filesystem
    install_command: npm install -g @modelcontextprotocol/server-filesystem
    command: npx
    args: ["@modelcontextprotocol/server-filesystem", "${ALLOWED_PATHS:-/tmp}"]
    enabled: true

  # Web browsing and scraping
  - name: browser
    install_command: pip install mcp-server-browser
    command: python
    args: ["-m", "mcp_server_browser"]
    enabled: true
    env:
      BROWSER_TIMEOUT: "30000"
      MAX_PAGES: "10"

  # Database operations
  - name: sqlite
    install_command: pip install mcp-server-sqlite
    command: python
    args: ["-m", "mcp_server_sqlite", "${DATABASE_PATH:-./data.db}"]
    enabled: true

  # Git operations
  - name: git
    install_command: pip install mcp-server-git
    command: python
    args: ["-m", "mcp_server_git"]
    enabled: true
    env:
      GIT_USER_NAME: ${GIT_USER_NAME:-"Claude"}
      GIT_USER_EMAIL: ${GIT_USER_EMAIL:-"claude@anthropic.com"}

  # Time and scheduling
  - name: time
    install_command: uvx install mcp-server-time
    command: uvx
    args: ["mcp-server-time"]
    enabled: true

# File processing configuration (minimal)
files:
  patterns: ["CLAUDE.md"]
  max_size: 1048576

# Network settings
fetch:
  timeout: 30000
  retries: 3
  retry_delay: 1000
  max_depth: 2

# Enhanced security
security:
  content_validation:
    enabled: true
    reject_patterns:
      # Credentials
      - "password\\s*[=:]\\s*['\"][^'\"]{3,}['\"]"
      - "api[_-]?key\\s*[=:]\\s*['\"][^'\"]{10,}['\"]"
      - "secret\\s*[=:]\\s*['\"][^'\"]{8,}['\"]"
      - "token\\s*[=:]\\s*['\"][^'\"]{20,}['\"]"
      
      # Command injection
      - "\\$\\([^)]*\\)"
      - "`[^`]*`"
      - ";\\s*(rm|del|format|sudo)"
      
      # Script execution
      - "<script[^>]*>"
      - "javascript:"
      - "eval\\s*\\("
      
    additional_keywords:
      - "malicious"
      - "exploit"
      - "backdoor"
      - "vulnerability"
    
    max_file_size: 10485760  # 10MB