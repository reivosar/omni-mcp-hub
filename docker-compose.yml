version: '3.8'

services:
  omni-mcp-hub:
    build: .
    ports:
      - "38574:38574"
    environment:
      - NODE_ENV=production
      - MCP_PORT=38574
      - REPOS_DIR=/app/repos
      # Specify sources to initialize on startup  
      - SOURCES=github:anthropics/claude-code,local:/app/test-data/lum,local:/app/test-data/rerere-ojisan
      - BUNDLE_MODE=true
    volumes:
      # Optional: persist cloned repositories
      - repos_data:/app/repos
    restart: unless-stopped

volumes:
  repos_data: