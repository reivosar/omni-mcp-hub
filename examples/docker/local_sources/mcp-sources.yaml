server:
  port: 3000

# Local filesystem documentation sources
local_sources:
  # Current project directory
  - url: ./
  
  # Example projects directory
  - url: ./examples
  
  # Source code directory
  - url: ./src
  
  # Documentation directory
  - url: ./docs

# File processing configuration
files:
  patterns:
    - "CLAUDE.md"
    - "README.md"
    - "*.md"
    - "docs/**/*.md"
    - "**/*.txt"
    - "CHANGELOG.md"
    - "CONTRIBUTING.md"
  max_size: 1048576  # 1MB

# Network settings (minimal for local files)
fetch:
  timeout: 30000
  retries: 2
  retry_delay: 500
  max_depth: 3

# Security configuration
security:
  content_validation:
    enabled: true
    max_file_size: 2097152  # 2MB