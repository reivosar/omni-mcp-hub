github_sources:
  - url: github:reivosar/claude-code-engineering-guide

local_sources:
  - path: /documents
  - path: /projects
  - path: /app/docs/multi

mcp_servers:
  - name: filesystem
    type: stdio
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "/projects"
      - "/documents"
    enabled: true