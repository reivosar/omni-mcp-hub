server:
  port: ${PORT:-3000}

# Environment configuration
environment:
  github_auth: ${GITHUB_TOKEN}

# GitHub repository documentation sources
github_sources:
  # Anthropic SDK TypeScript
  - url: github:anthropics/anthropic-sdk-typescript
    branch: main

# File processing configuration
files:
  patterns:
    - "dsl/*.dsl"
    - "dsl/**/*.dsl"
    - "dsl/CLAUDE.md"
  max_size: 2097152  # 2MB

# Network settings
fetch:
  timeout: 60000  # 1 minute
  retries: 3
  retry_delay: 1000
  max_depth: 3

# Security configuration
security:
  content_validation:
    enabled: true
    max_file_size: 5242880  # 5MB