# Test configuration for MCP Server - Modern format
# Updated to match current configuration structure

server:
  port: ${PORT}

github_sources:
  - url: github:microsoft/vscode
    token: ${GITHUB_TOKEN_TEST}
    owner: microsoft
    repo: vscode
    branch: main

local_sources:
  - url: /tmp/test-project
    path: /tmp/test-project
    behavior_priority: 1

mcp_servers: []

files:
  patterns:
    - CLAUDE.md
  max_size: 10240  # 10KB for tests

fetch:
  timeout: 5000
  retries: 2
  retry_delay: 500
  max_depth: 2

security:
  content_validation:
    enabled: false
    max_file_size: 10240

behavior_detection:
  enabled: true